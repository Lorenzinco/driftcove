name: Test WireGuard Setup

on: [push, pull_request]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image
        run: docker build -f backend/Dockerfile -t driftcove-test backend

      - name: Start the container
        run: |
          docker run -d --name driftcove \
            --cap-add=NET_ADMIN \
            --cap-add=SYS_MODULE \
            --sysctl net.ipv4.ip_forward=1 \
            --sysctl net.ipv4.conf.all.rp_filter=0 \
            --sysctl net.ipv4.conf.default.rp_filter=0 \
            -p 51820:51820/udp -p 8000:8000 \
            -e WG_BACKEND_TCP_PORT=8000 \
            -e WG_UDP_PORT=51820 \
            driftcove-test

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/tests/requirements.txt

      - name: Wait for FastAPI to be ready
        run: |
          until curl -s http://localhost:8000/network/status; do
            echo "Waiting for server..."
            sleep 2
          done

      - name: Run backend smoke test
        run: python backend/tests/test.py

      - name: Run backend network policy tests
        env:
          RUN_BACKEND_DOCKER_TESTS: "1"
        run: python -m unittest backend/tests/backend_network_policy_test.py -v
